# cargo-deny config — gha-runner-ctl (MIT)
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false

[advisories]
version = 2
yanked = "deny"
# vulnerability, unmaintained, unsound, notice handled by default

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "CDLA-Permissive-2.0", # webpki-roots (TLS trust store used by ureq/rustls)
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
