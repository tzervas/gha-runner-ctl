# Fleet standard CI — self-hosted. Honest status on trunk via Actions badge.
# See docs/FLEET_STANDARDS.md (or plans/fractal/P26_FLEET_STANDARDS.md).
name: fleet-ci

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]
  workflow_dispatch:

concurrency:
  group: fleet-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect:
    name: detect stack
    runs-on: [self-hosted, linux, x64, podman]
    outputs:
      rust: ${{ steps.d.outputs.rust }}
      python: ${{ steps.d.outputs.python }}
    steps:
      - uses: actions/checkout@v4
      - id: d
        run: |
          set -euo pipefail
          rust=false; python=false
          # Real Rust crate or non-empty workspace members only.
          if [ -f Cargo.toml ]; then
            if grep -qE '^\[package\]' Cargo.toml; then
              rust=true
            elif grep -qE 'members\s*=\s*\[[^]]*["'\''][^"'\'']' Cargo.toml; then
              rust=true
            elif find . -path ./target -prune -o -name Cargo.toml -print 2>/dev/null \
              | grep -v '^\./Cargo.toml$' | head -1 | grep -q .; then
              rust=true
            fi
          fi
          if [ -f pyproject.toml ] || [ -f requirements.txt ] || [ -f setup.py ]; then python=true; fi
          echo "rust=$rust" >> "$GITHUB_OUTPUT"
          echo "python=$python" >> "$GITHUB_OUTPUT"
          echo "Detected rust=$rust python=$python"

  rust:
    name: cargo check/test
    needs: detect
    if: needs.detect.outputs.rust == 'true'
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - uses: actions/checkout@v4
      # Pin to package MSRV / rust-toolchain.toml (1.96). Prefer ambient cargo from the
      # work image when present; otherwise install via rustup (no Docker — Podman fleet).
      - name: Ensure Rust toolchain (1.96)
        run: |
          set -euo pipefail
          want="1.96"
          if command -v rustc >/dev/null 2>&1 && command -v cargo >/dev/null 2>&1; then
            ver="$(rustc --version 2>/dev/null || true)"
            echo "ambient rustc: $ver"
            if echo "$ver" | grep -qE "rustc ${want}"; then
              rustup component add rustfmt clippy 2>/dev/null || true
              exit 0
            fi
          fi
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -fsSL https://sh.rustup.rs -o /tmp/rustup-init.sh
            sh /tmp/rustup-init.sh -y --default-toolchain "${want}" --profile minimal \
              --component rustfmt --component clippy
            # shellcheck disable=SC1091
            . "$HOME/.cargo/env" 2>/dev/null || export PATH="$HOME/.cargo/bin:$PATH"
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          else
            rustup toolchain install "${want}" --profile minimal -c rustfmt -c clippy
            rustup default "${want}"
          fi
          rustc --version
          cargo --version
      - name: cargo check
        run: cargo check --workspace --all-targets
      - name: cargo test
        run: cargo test --workspace

  python:
    name: python lint/test
    needs: detect
    if: needs.detect.outputs.python == 'true'
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
      - name: Sync deps
        run: |
          set -euo pipefail
          if [ -f uv.lock ] || [ -f pyproject.toml ]; then
            if ! uv sync --all-groups; then
              uv sync
            fi
          fi
      - name: Ruff (if configured)
        run: |
          set -euo pipefail
          if [ -f pyproject.toml ] && grep -q '\[tool.ruff' pyproject.toml 2>/dev/null; then
            uv run ruff check . || python -m ruff check .
          else
            echo "ruff not configured — skip (not a claimed gate)"
          fi
      - name: Pytest (if tests exist)
        run: |
          set -euo pipefail
          if [ -d tests ] || [ -d test ]; then
            if command -v uv >/dev/null 2>&1 && [ -f pyproject.toml ]; then
              uv run pytest -q
            elif command -v pytest >/dev/null 2>&1; then
              pytest -q
            else
              echo "::error title=FAIL_ENV::pytest not available after env setup"
              echo "HONEST_CI class=FAIL_ENV detail=pytest_missing"
              exit 1
            fi
          else
            echo "no tests/ directory — skip (not a claimed gate)"
          fi

  noop:
    name: fleet-ci stub (no stack — not a product gate)
    needs: detect
    if: needs.detect.outputs.rust != 'true' && needs.detect.outputs.python != 'true'
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - run: |
          echo "::notice title=SKIP_STUB::No Cargo.toml/pyproject — fleet-ci has no product gates"
          echo "HONEST_CI class=SKIP_STUB detail=no_stack"
          echo "Add stack files or product CI for real coverage. Do not treat this job as multi-language CI."
