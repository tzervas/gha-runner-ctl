name: ci
on:
  push:
    branches: [main, dev]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    # Prefer the shared self-hosted runner when available.
    # `large` is a fleet size label (4c/8g) so rustup+cargo are not OOM-killed (exit 137).
    runs-on: [self-hosted, linux, x64, podman, large]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96
        with:
          components: clippy, rustfmt
      - name: fmt
        run: cargo fmt --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test
      - name: build
        run: cargo build --release
