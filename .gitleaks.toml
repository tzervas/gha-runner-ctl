# gha-runner-ctl redacts GitHub token shapes; tests exercise those fixtures.
# PR/push fleet-security uses --no-git tip scan; schedule uses full history.
title = "gha-runner-ctl gitleaks"

[extend]
useDefault = true

[allowlist]
description = "Test fixtures and build artifacts (not live credentials)"
paths = [
  '''(^|/)tests/''',
  '''(^|/)target/''',
  '''(^|/)\.git/''',
]
regexes = [
  # Truncated/fake PAT shapes used only in redact unit tests
  '''ghp_ABC[A-Z0-9]{0,30}''',
  '''ghp_XYZ[A-Z0-9]{0,30}''',
  '''RUNNER_TOKEN=test[_-]?token[_-]?value''',
]
